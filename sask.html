        "pull": "витягнути (дієслово)",
        "even": "навіть (прислівник)",

        "most": "найбільш (прислівник)",
        "beautiful": "прекрасне (прикметник)",
        "place": "місце (іменник)"
      },
      sentences: {
        "welcome to the prairies.": "Ласкаво просимо до прерій.",
        "i farm out near kindersley, saskatchewan.": "Я фермерую неподалік Кіндерслі, Саскачеван.",
        "when you look around here, the sky is so big it feels like it might swallow you whole.": "Коли ви озираєтесь навколо, небо таке велике, що здається, ніби воно може проковтнути вас цілком.",

        "they think it is just flat land and wheat, like that old comedy show about the gas station in the middle of nowhere.": "Вони думають, що це просто рівнинна земля і пшениця, як у тому старому комедійному шоу про заправку посеред нічого.",

        "we drive tractors the size of small houses, planting canola and barley until our eyes blur.": "Ми водимо трактори розміром з невеликі будинки, сіючи канолу та ячмінь, поки в очах не помутніє.",
        "we worry about rain, we worry about frost, and we fix broken machinery with whatever we have.": "Ми хвилюємося через дощ, хвилюємося через мороз і лагодимо зламану техніку тим, що є під рукою.",
        "like red green always said on television, \"i am a man, but i can change, if i have to, i guess.\"": "Як завжди казав Ред Грін по телевізору: «Я чоловік, але я можу змінитися, якщо доведеться, мабуть».",
        "out here, changing mostly means learning how to rebuild a diesel engine in the dark.": "Тут зміни переважно означають навчання тому, як перебрати дизельний двигун у темряві.",

        "in the fall, when the harvest is done, the whole town gets together for a supper at the community hall.": "Восени, коли зібрано урожай, усе місто збирається на вечерю в громадському залі.",

        "but that just means more time for hockey on the frozen pond and drinking hot coffee by the wood stove.": "Але це просто означає більше часу для хокею на замерзлому ставку та пиття гарячої кави біля дров'яної печі.",
        "you learn to rely on your neighbours.": "Ви вчитеся покладатися на своїх сусідів.",
        "if your truck gets stuck in the snow, three people will stop to pull you out before you even ask.": "Якщо ваша вантажівка застрягне в снігу, троє людей зупиняться, щоб витягнути вас, ще до того, як ви попросите.",
        "so, it is a life of toil, but the joy outweighs the sweat.": "Отже, це життя в тяжкій праці, але радість переважає піт.",

    const normalizeKey = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');

    const normalizedDict = {
      words: Object.fromEntries(Object.entries(dictManifest.words).map(([k, v]) => [normalizeKey(k), v])),
      sentences: Object.fromEntries(Object.entries(dictManifest.sentences).map(([k, v]) => [normalizeKey(k), v]))
    };

    const rawText = `Welcome to the prairies. I farm out near Kindersley, Saskatchewan. When you look around here, the sky is so big it feels like it might swallow you whole. Some folks think there is not much going on out here. They think it is just flat land and wheat, like that old comedy show about the gas station in the middle of nowhere. But they are missing the best parts.

Farming is hard work. You wake up before the sun, and you go to bed long after the mosquitoes come out. Spring is a race against the clock. We drive tractors the size of small houses, planting canola and barley until our eyes blur. We worry about rain, we worry about frost, and we fix broken machinery with whatever we have. Like Red Green always said on television, "I am a man, but I can change, if I have to, I guess." Out here, changing mostly means learning how to rebuild a diesel engine in the dark.

But the joy is in the quiet moments. There is nothing like the smell of the earth after a summer storm. You can sit on the porch and watch the lightning dance across the horizon fifty miles away. In the fall, when the harvest is done, the whole town gets together for a supper at the community hall. We share pies, we share stories, and we laugh until our ribs hurt.

Winter is long and cold, sure. The snow piles up to the windows, and the wind howls like a lonely coyote. But that just means more time for hockey on the frozen pond and drinking hot coffee by the wood stove. You learn to rely on your neighbours. If your truck gets stuck in the snow, three people will stop to pull you out before you even ask.

So, it is a life of toil, but the joy outweighs the sweat. Keep your stick on the ice, work hard, and you will find that this flat land is the most beautiful place on earth.`;

    function App() {
      const [popup, setPopup] = useState({ visible: false, x: 0, y: 0, text: '', translation: '', type: '' });
      const [activeSentence, setActiveSentence] = useState(null);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = () => setPopup(prev => ({ ...prev, visible: false }));
        window.addEventListener('click', handleClickOutside);
        return () => window.removeEventListener('click', handleClickOutside);
      }, []);

      const playAudio = (text, type) => {
        window.speechSynthesis.cancel();
        let cleanText = text.replace(/\s*\(.*?\)\s*/g, '').trim();
        if (type === 'word' && cleanText.includes('/')) {
          cleanText = cleanText.split('/')[0].trim();
        }
        if (!cleanText) return;
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'uk-UA';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      };

      const handleTextClick = (e, word, sentence) => {
        e.stopPropagation();
        const isCtrl = e.ctrlKey || e.metaKey;
        const targetText = isCtrl ? sentence : word;
        const lookupKey = normalizeKey(targetText);
        let translation = isCtrl
          ? normalizedDict.sentences[lookupKey] || "Переклад речення недоступний."
          : normalizedDict.words[lookupKey] || "Слово не знайдено в словнику.";
        const x = Math.min(e.clientX, window.innerWidth - 270);
        const y = e.clientY + 20;
        setActiveSentence(isCtrl ? sentence : null);
        setPopup({ visible: true, x, y, text: targetText.trim(), translation, type: isCtrl ? 'sentence' : 'word' });
      };

      const paragraphs = rawText.split('\n\n').map(p => {
        const sentences = p.match(/[^.!?]+[.!?]+["']*/g) || [p];
        return sentences.map(s => ({
          original: s,
          words: s.split(/(\s+)/)
        }));
      });

      return (
        <div className="min-h-screen bg-stone-50 text-stone-800 p-8 font-serif selection:bg-blue-200" ref={containerRef}>
          <div className="max-w-2xl mx-auto bg-white p-10 rounded-xl shadow-sm border border-stone-200">
            <h1 className="text-2xl font-bold mb-6 font-sans text-stone-900">Farming the Prairies: A Saskatchewan Story</h1>
            <p className="text-sm font-sans text-stone-500 mb-8 border-b pb-4">
              <strong>Instructions:</strong> Click any word to translate it to Ukrainian. <code>Ctrl + Click</code> (or Cmd + Click) anywhere in a sentence to translate the full sentence. Use the 🔊 button to hear the Ukrainian pronunciation.
            </p>

            <div className="text-lg leading-loose space-y-6">
              {paragraphs.map((sentences, pIdx) => (
                <p key={pIdx}>
                  {sentences.map((sentenceObj, sIdx) => (
                    <span
                      key={sIdx}
                      className={`transition-colors duration-200 ${activeSentence === sentenceObj.original && popup.visible ? 'bg-blue-100' : ''}`}
                    >
                      {sentenceObj.words.map((wordOrSpace, wIdx) => {
                        if (!wordOrSpace.trim()) return <span key={wIdx}>{wordOrSpace}</span>;
                        return (
                          <span
                            key={wIdx}
                            onClick={(e) => handleTextClick(e, wordOrSpace, sentenceObj.original)}
                            className="cursor-pointer hover:bg-green-200 hover:text-green-900 transition-colors duration-150 rounded px-px"
                          >
                            {wordOrSpace}
                          </span>
                        );
                      })}
                    </span>
                  ))}
                </p>
              ))}
            </div>
          </div>

          {popup.visible && (
            <div
              onClick={(e) => e.stopPropagation()}
              className="fixed z-50 w-64 bg-white border border-stone-200 rounded-lg shadow-xl overflow-hidden font-sans"
              style={{ top: popup.y, left: popup.x }}
            >
              <div className="bg-stone-100 px-3 py-2 border-b border-stone-200 flex justify-between items-center">
                <span className="text-xs font-semibold uppercase tracking-wider text-stone-500">
                  {popup.type === 'sentence' ? 'Sentence' : 'Word'}
                </span>
                <button
                  onClick={() => playAudio(popup.translation, popup.type)}
                  className="p-1.5 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition-colors"
                  title="Listen to Ukrainian"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                  </svg>
                </button>
              </div>
              <div className="p-3">
                <div className="text-sm text-stone-500 mb-1">{popup.text}</div>
                <div className="text-base font-medium text-stone-900">{popup.translation}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</html>
