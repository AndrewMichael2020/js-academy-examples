        ["keep your stick on the ice, work hard, and you will find that this flat land is the most beautiful place on earth.","Тримай ключку на льоду, працюй наполегливо, і ти зрозумієш, що ця рівнинна земля — найпрекрасніше місце на світі."]
      ],
      ko: [

        ["when you look around here, the sky is so big it feels like it might swallow you whole.","여기서 주위를 둘러보면, 하늘이 너무 커서 당신을 통째로 삼킬 것 같은 느낌이 듭니다."],

        ["we share pies, we share stories, and we laugh until our ribs hurt.","우리는 파이를 나누고, 이야기를 나누며, 갈비뼈가 아플 때까지 웃습니다."],
        ["winter is long and cold, sure.","겨울은 길고 춥습니다, 물론이죠."],
        ["the snow piles up to the windows, and the wind howls like a lonely coyote.","눈은 창문까지 쌓이고, 바람은 외로운 코요테처럼 울부짖습니다."],
        ["but that just means more time for hockey on the frozen pond and drinking hot coffee by the wood stove.","하지만 그것은 단지 얼어붙은 연못에서 하키를 하고 장작 난로 옆에서 뜨거운 커피를 마실 시간이 더 많아진다는 것을 의미합니다."],
        ["you learn to rely on your neighbours.","당신은 이웃들에게 의지하는 법을 배웁니다."],
        ["if your truck gets stuck in the snow, three people will stop to pull you out before you even ask.","트럭이 눈에 빠지면, 당신이 부탁하기도 전에 세 명이 멈춰서 끌어내 줄 것입니다."],
        ["so, it is a life of toil, but the joy outweighs the sweat.","그래서, 이것은 힘든 노동의 삶이지만, 기쁨이 땀보다 더 큽니다."],
        ["keep your stick on the ice, work hard, and you will find that this flat land is the most beautiful place on earth.","스틱을 얼음 위에 올려놓고, 열심히 일하면, 이 평평한 땅이 지구에서 가장 아름다운 곳임을 알게 될 것입니다."]

    // Build lookup maps: normalizedEnglishKey → [translation, sentenceIndex]
    const buildMaps = (lang) => {
      const wordMap = {};
      for (const [k, v] of Object.entries(WORDS[lang]))
        wordMap[normalizeKey(k)] = v;
      const sentenceMap = {};
      const sentenceIdx = {};
      SENTENCES[lang].forEach(([en, tr], i) => {
        const key = normalizeKey(en);
        sentenceMap[key] = tr;
        sentenceIdx[key] = i;
      });
      return { wordMap, sentenceMap, sentenceIdx };
    };

    const rawText = `Welcome to the prairies. I farm out near Kindersley, Saskatchewan. When you look around here, the sky is so big it feels like it might swallow you whole. Some folks think there is not much going on out here. They think it is just flat land and wheat, like that old comedy show about the gas station in the middle of nowhere. But they are missing the best parts.

Farming is hard work. You wake up before the sun, and you go to bed long after the mosquitoes come out. Spring is a race against the clock. We drive tractors the size of small houses, planting canola and barley until our eyes blur. We worry about rain, we worry about frost, and we fix broken machinery with whatever we have. Like Red Green always said on television, "I am a man, but I can change, if I have to, I guess." Out here, changing mostly means learning how to rebuild a diesel engine in the dark.

But the joy is in the quiet moments. There is nothing like the smell of the earth after a summer storm. You can sit on the porch and watch the lightning dance across the horizon fifty miles away. In the fall, when the harvest is done, the whole town gets together for a supper at the community hall. We share pies, we share stories, and we laugh until our ribs hurt.

Winter is long and cold, sure. The snow piles up to the windows, and the wind howls like a lonely coyote. But that just means more time for hockey on the frozen pond and drinking hot coffee by the wood stove. You learn to rely on your neighbours. If your truck gets stuck in the snow, three people will stop to pull you out before you even ask.

So, it is a life of toil, but the joy outweighs the sweat. Keep your stick on the ice, work hard, and you will find that this flat land is the most beautiful place on earth.`;

    const LANG_META = {
      uk: { label: 'UA', flag: '🇺🇦', name: 'Ukrainian' },
      ko: { label: 'KR', flag: '🇰🇷', name: 'Korean'   },
    };

    const audioCache = {};
    function playAudioFile(src) {
      if (!audioCache[src]) audioCache[src] = new Audio(src);
      const a = audioCache[src];
      a.currentTime = 0;
      a.play().catch(() => {});
    }

    function App() {
      const [lang, setLang] = useState('uk');
      const [popup, setPopup] = useState({ visible: false, x: 0, y: 0, text: '', translation: '', audioSrc: '' });
      const [activeSentence, setActiveSentence] = useState(null);
      const containerRef = useRef(null);
      const maps = buildMaps(lang);

      useEffect(() => {
        const close = () => setPopup(p => ({ ...p, visible: false }));
        window.addEventListener('click', close);
        return () => window.removeEventListener('click', close);
      }, []);

      // Close popup when language switches
      useEffect(() => {
        setPopup(p => ({ ...p, visible: false }));
        setActiveSentence(null);
      }, [lang]);

      const handleTextClick = (e, word, sentence) => {
        e.stopPropagation();
        const isCtrl = e.ctrlKey || e.metaKey;
        const targetText = isCtrl ? sentence : word;
        const key = normalizeKey(targetText);
        let translation, audioSrc;
        if (isCtrl) {
          translation = maps.sentenceMap[key] || '—';
          const idx = maps.sentenceIdx[key];
          audioSrc = idx !== undefined ? `audio/${lang}/sentences/${idx}.mp3` : null;
        } else {
          translation = maps.wordMap[key] || '—';
          audioSrc = `audio/${lang}/words/${key}.mp3`;
        }
        const x = Math.min(e.clientX, window.innerWidth - 280);
        const y = e.clientY + 22;
        setActiveSentence(isCtrl ? sentence : null);
        setPopup({ visible: true, x, y, text: targetText.trim(), translation, audioSrc, type: isCtrl ? 'sentence' : 'word' });
      };

      const paragraphs = rawText.split('\n\n').map(p => {
        const sentences = p.match(/[^.!?]+[.!?]+["']*/g) || [p];
        return sentences.map(s => ({ original: s, words: s.split(/(\s+)/) }));
      });

      return (
        <div className="min-h-screen bg-stone-50 text-stone-800 p-6 md:p-10 font-serif selection:bg-yellow-100" ref={containerRef}>
          <div className="max-w-2xl mx-auto bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-stone-200">

            {/* Header */}
            <div className="flex items-start justify-between gap-4 mb-2">
              <h1 className="text-2xl font-bold font-sans text-stone-900 leading-snug">
                Farming the Prairies<br/>
                <span className="text-stone-400 font-normal text-lg">A Saskatchewan Story</span>
              </h1>
              {/* Language switcher */}
              <div className="flex gap-1.5 shrink-0 mt-1">
                {Object.entries(LANG_META).map(([code, meta]) => (
                  <button
                    key={code}
                    onClick={(e) => { e.stopPropagation(); setLang(code); }}
                    title={meta.name}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-semibold border transition-all duration-150 font-sans
                      ${lang === code
                        ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                        : 'bg-white text-stone-500 border-stone-200 hover:border-stone-400'}`}
                  >
                    <span>{meta.flag}</span>
                    <span>{meta.label}</span>
                  </button>
                ))}
              </div>
            </div>

            <p className="text-xs font-sans text-stone-400 mb-8 border-b border-stone-100 pb-5 mt-4">
              Click any <span className="text-green-600 font-medium">word</span> to translate · <kbd className="bg-stone-100 px-1 py-0.5 rounded text-stone-500">Ctrl</kbd>+click a sentence for the full translation · �� to hear it
            </p>

            {/* Story */}
            <div className="text-[1.08rem] leading-[1.95] space-y-6 text-stone-800">
              {paragraphs.map((sentences, pIdx) => (
                <p key={pIdx}>
                  {sentences.map((sentObj, sIdx) => (
                    <span
                      key={sIdx}
                      className={`transition-colors duration-150 rounded ${activeSentence === sentObj.original && popup.visible ? 'bg-yellow-100' : ''}`}
                    >
                      {sentObj.words.map((tok, wIdx) => {
                        if (!tok.trim()) return <span key={wIdx}>{tok}</span>;
                        return (
                          <span
                            key={wIdx}
                            onClick={(e) => handleTextClick(e, tok, sentObj.original)}
                            className="cursor-pointer hover:bg-green-100 hover:text-green-800 transition-colors duration-100 rounded-sm px-px"
                          >{tok}</span>
                        );
                      })}
                    </span>
                  ))}
                </p>
              ))}
            </div>
          </div>

          {/* Popup */}
          {popup.visible && (
            <div
              onClick={e => e.stopPropagation()}
              className="pop-in fixed z-50 w-72 bg-white border border-stone-200 rounded-xl shadow-2xl overflow-hidden font-sans"
              style={{ top: popup.y, left: popup.x }}
            >
              {/* Popup header */}
              <div className="flex items-center justify-between px-3.5 py-2.5 bg-stone-50 border-b border-stone-100">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-bold uppercase tracking-widest text-stone-400">
                    {popup.type === 'sentence' ? 'Sentence' : 'Word'}
                  </span>
                  <span className="text-[10px] font-semibold text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded-full">
                    {LANG_META[lang].flag} {LANG_META[lang].label}
                  </span>
                </div>
                {popup.audioSrc && (
                  <button
                    onClick={() => playAudioFile(popup.audioSrc)}
                    className="p-1.5 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 active:scale-95 transition-all"
                    title={`Listen in ${LANG_META[lang].name}`}
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    </svg>
                  </button>
                )}
              </div>
              {/* Popup body */}
              <div className="px-3.5 py-3">
                <div className="text-xs text-stone-400 mb-1 truncate">{popup.text}</div>
                <div className="text-base font-medium text-stone-900 leading-snug">{popup.translation}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
